<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Vendedor</title><link rel="stylesheet" th:href="@{/css/styles.css(v='nexora5')}"></head>
<body>
<div th:replace="~{fragments :: header}"></div>
<main class="container">
    <div class="section-head"><div><p class="eyebrow">Panel vendedor</p><h1>Publicaciones e inventario</h1><p class="muted">Publica productos con imagen; el admin decide si se muestran.</p></div></div>
    <p class="alert" th:if="${session.user.penalties >= 4}">Alerta roja: tienes 4 penalizaciones. A la quinta seras vetado de la pagina.</p>
    <section class="dash-panel" th:if="${!#lists.isEmpty(session.user.adminMessages)}">
        <h2>Mensajes del administrador</h2>
        <div class="notice-list"><p th:each="message : ${session.user.adminMessages}" th:text="${message}"></p></div>
    </section>
    <section class="layout-2">
        <form class="glass-form seller-publish-form" th:action="@{/seller/products}" method="post" enctype="multipart/form-data">
            <h2>Publicar producto</h2>
            <label>Nombre <input name="name" required></label>
            <label>Categoria <select name="category"><option>Tecnologia</option><option>Hogar</option><option>Moda</option><option>Deportes</option></select></label>
            <label>Precio <input type="number" step="0.01" min="1" name="price" required></label>
            <label>Stock <input type="number" min="1" name="stock" required></label>
            <label>Subir imagen <input type="file" name="imageFile" accept="image/*"></label>
            <label>URL de imagen opcional <input name="imageUrl" placeholder="https://..."></label>
            <label>Descripcion <textarea name="description" required></textarea></label>
            <button class="glow-button" type="submit">Publicar</button>
        </form>
        <section>
            <h2>Mis publicaciones</h2>
            <div class="seller-edit-list">
                <form class="seller-edit-card" th:each="product : ${products}" th:action="@{/seller/products/update}" method="post" enctype="multipart/form-data">
                    <input type="hidden" name="productId" th:value="${product.id}">
                    <img th:src="${product.imageUrl}" th:alt="${product.name}">
                    <div class="seller-edit-fields">
                        <label>Nombre <input name="name" th:value="${product.name}" required></label>
                        <label>Categoria <select name="category"><option th:selected="${product.category == 'Tecnologia'}">Tecnologia</option><option th:selected="${product.category == 'Hogar'}">Hogar</option><option th:selected="${product.category == 'Moda'}">Moda</option><option th:selected="${product.category == 'Gaming'}">Gaming</option><option th:selected="${product.category == 'Deportes'}">Deportes</option></select></label>
                        <label>Precio <input type="number" step="0.01" min="1" name="price" th:value="${product.price}" required></label>
                        <label>Stock <input type="number" min="0" name="stock" th:value="${product.stock}" required></label>
                        <label>URL nueva <input name="imageUrl" placeholder="Opcional"></label>
                        <label>Subir imagen <input type="file" name="imageFile" accept="image/*"></label>
                        <label class="wide">Descripcion <textarea name="description" th:text="${product.description}" required></textarea></label>
                    </div>
                    <div class="seller-edit-actions">
                        <span class="status-pill" th:classappend="${product.approved ? ' done' : ' pending'}" th:text="${product.approved ? 'Aprobado' : 'Pendiente'}"></span>
                        <button class="glow-button" type="submit">Guardar cambios</button>
                    </div>
                </form>
            </div>
        </section>
    </section>
</main>
</body>
</html>
