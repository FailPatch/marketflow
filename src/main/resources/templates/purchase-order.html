<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Orden de compra</title><link rel="stylesheet" th:href="@{/css/styles.css}"></head><body><div th:replace="~{fragments :: header}"></div><main class="container">
<h1>Orden de compra</h1><form class="actions-row" th:action="@{/purchase-order}" method="post"><button class="ghost-button" name="action" value="new">Nueva orden</button><input name="providerName" placeholder="Proveedor"><button class="glow-button" name="action" value="save">Grabar orden</button></form>
<section class="layout-2"><div><h2>Articulos disponibles</h2><form class="item-row" th:each="article : ${articles}" th:action="@{/purchase-order}" method="post"><span th:text="${article.name + ' - S/ ' + article.price}"></span><input type="hidden" name="articleId" th:value="${article.id}"><button class="glow-button" name="action" value="add">Agregar</button></form></div><div><h2>Orden actual</h2><form class="item-row" th:each="article,status : ${order.articles}" th:action="@{/purchase-order}" method="post"><span th:text="${article.name + ' - S/ ' + article.price}"></span><input type="hidden" name="index" th:value="${status.index}"><button class="ghost-button" name="action" value="remove">Quitar</button></form><p class="price">Total: S/ <span th:text="${order.total}"></span></p><p class="success" th:if="${order.saved}">Orden grabada correctamente.</p></div></section>
<h2>Ordenes grabadas</h2><div class="table-wrap"><table><thead><tr><th>ID</th><th>Proveedor</th><th>Total</th></tr></thead><tbody><tr th:each="saved : ${orders}"><td th:text="${saved.id}"></td><td th:text="${saved.providerName}"></td><td th:text="${saved.total}"></td></tr></tbody></table></div>
</main></body></html>
