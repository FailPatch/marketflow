<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmacion</title>
    <link rel="stylesheet" th:href="@{/css/styles.css(v='nexora3')}">
</head>
<body>
<div th:replace="~{fragments :: header}"></div>
<main class="container">
    <p class="success" th:text="${message}">Compra confirmada.</p>
    <section class="glass-form" th:if="${session.reviewTokens != null}">
        <h2>Reseñar productos recibidos</h2>
        <form th:each="token : ${session.reviewTokens}" th:action="@{/reviews}" method="post" class="glass-form">
            <input type="hidden" name="token" th:value="${token}">
            <p th:text="${token}">Producto</p>
            <label>Calificacion <input type="number" min="1" max="5" name="rating" value="5"></label>
            <label>Estado
                <select name="condition">
                    <option>Llego como se muestra</option>
                    <option>No coincide con la publicacion</option>
                    <option>Llego danado o incompleto</option>
                </select>
            </label>
            <label>Comentario <textarea name="comment" required></textarea></label>
            <button class="glow-button" type="submit">Enviar reseña</button>
        </form>
    </section>
</main>
</body>
</html>
