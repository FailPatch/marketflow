<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Empleados</title><link rel="stylesheet" th:href="@{/css/styles.css}"></head><body><div th:replace="~{fragments :: header}"></div><main class="container">
<h1>Empleados</h1><section class="layout-2"><form class="glass-form" th:action="@{/employees}" method="post"><h2>Registrar empleado</h2><label>Nombre <input name="name" required></label><label>Correo <input type="email" name="email" required></label><button class="glow-button">Grabar</button></form><div class="table-wrap"><table><thead><tr><th>ID</th><th>Nombre</th><th>Correo</th></tr></thead><tbody><tr th:each="employee : ${employees}"><td th:text="${employee.id}"></td><td th:text="${employee.name}"></td><td th:text="${employee.email}"></td></tr></tbody></table></div></section>
</main></body></html>
