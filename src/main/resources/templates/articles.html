<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Articulos</title><link rel="stylesheet" th:href="@{/css/styles.css}"></head><body><div th:replace="~{fragments :: header}"></div><main class="container">
<h1>Articulos</h1><section class="layout-2"><form class="glass-form" th:action="@{/articles}" method="post"><h2>Grabar articulo</h2><label>Nombre <input name="name" required></label><label>Precio <input type="number" step="0.01" name="price" required></label><button class="glow-button">Grabar</button></form><div><form class="search-bar" th:action="@{/articles}" method="get"><input name="query" th:value="${query}" placeholder="Buscar por ID o nombre"><button class="ghost-button">Buscar</button></form><div class="table-wrap"><table><thead><tr><th>ID</th><th>Articulo</th><th>Precio</th><th>Actualizar</th><th>Eliminar</th></tr></thead><tbody><tr th:each="article : ${articles}"><td th:text="${article.id}"></td><td th:text="${article.name}"></td><td th:text="${article.price}"></td><td><form th:action="@{/articles/update}" method="post"><input type="hidden" name="id" th:value="${article.id}"><input name="name" th:value="${article.name}"><input type="number" step="0.01" name="price" th:value="${article.price}"><button class="ghost-button">Actualizar</button></form></td><td><form th:action="@{/articles/delete}" method="post"><input type="hidden" name="id" th:value="${article.id}"><button class="ghost-button">Eliminar</button></form></td></tr></tbody></table></div></div></section>
</main></body></html>
