<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - NEXORA</title>
    <link rel="stylesheet" th:href="@{/css/styles.css(v='nexora3')}">
</head>
<body>
<div th:replace="~{fragments :: header}"></div>
<main class="container">
    <form class="glass-form" style="max-width:520px;margin:auto" th:action="@{/register}" method="post">
        <p class="eyebrow">Registro</p>
        <h1>Crear cuenta</h1>
        <label>Nombre <input name="name" required></label>
        <label>Correo <input type="email" name="email" required></label>
        <label>Contrasena <input type="password" name="password" required></label>
        <label>Rol
            <select name="role">
                <option value="BUYER">Comprador</option>
                <option value="SELLER">Vendedor</option>
            </select>
        </label>
        <button class="glow-button" type="submit">Registrarme y entrar</button>
    </form>
</main>
</body>
</html>
